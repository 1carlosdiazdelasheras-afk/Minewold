<!DOCTYPE html>
<html lang="es">
<head>

<title>Mi Servidor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

/* MENU */

nav{
    background:#111827;
    padding:20px;
    display:flex;
    justify-content:center;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    background:#1e293b;
    padding:12px 20px;
    border-radius:10px;
    transition:0.3s;
}

nav a:hover{
    background:#38bdf8;
    transform:scale(1.05);
}

/* CONTENIDO */

.hero{
    text-align:center;
    padding:120px 20px;
}

.hero h1{
    font-size:60px;
    color:#38bdf8;
    margin-bottom:20px;
}

.hero p{
    font-size:24px;
    color:#cbd5e1;
}

</style>
</head>

<body>

<!-- MENU -->

<nav>
    <a href="#">Inicio</a>

    <a href="https://tienda.minewold.net" target="_blank">
        Tienda
    </a>

        Discord

    <a href="https://discord.minewold.net" target="_blank">
        Soporte
    </a>
